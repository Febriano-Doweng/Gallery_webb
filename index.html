<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Meta Tag -->
    <meta name="description" content="One Gallery, Web Gallery, one piece.">
    <meta name="author" content="Spider-Dev"
    <meta name="keywords" content="One Gallery, Gallery personal, website gallery estetik, website galeri pribadi, one piece.">
    <!-- Judul Halaman Web -->
    <title> ワンギャラリー | Aku dan Dia</title>
    <!-- Logo Pada Titel/Tab Halaman -->
    <link rel="icon" type="image/png" href="img/timika_papua.png" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <!-- logo gallery -->
            <img src="img/Logo_pirate.png" alt="Sunny" />
            <span> ワンギャラリー </span>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#">Home</a></li>
            <li><a href="#gallery">Galeri</a></li>
        </ul>
        <div class="nav-actions">
            <button onclick="toggleTheme()" class="icon-btn">
                <!-- Icon Light Mode -->
                <svg id="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                </svg>
                
                <!-- Icon Dark Mode -->
                <svg id="moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
                </svg>
            </button>
            <!-- Icon Menu Button -->
            <button class="menu-toggle icon-btn" onclick="toggleMenu()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Content Hero -->
  <header class="hero">
    <img src="img/Sunny.png" alt="Hero Image" class="hero-img">
      <div class="hero-content">
          <h1 class="hero-title"> <span>   ワンギャラリー </span>  へようこそ
            </h1>
          <p class="hero-subtitle">
        Jelajahi dunia petualangan dan kenangan terbaik.
        </p>
      <div class="hero-buttons">
        <a href="#gallery" class="btn-primary">Explore</a>
        </div>
      </div>
    </header>

    <!-- Content Halaman Utama -->
    <main id="gallery" class="container">
        <div class="section-header">
            <h2 class="section-title">Koleksi Terbaru</h2> <br>
            <p class="section-subtitle">Geser ke samping untuk melihat lebih banyak</p>
            <div class="filter-wrapper">
                <button class="filter-btn active" onclick="filterMedia('all', event)">Semua</button>
                <button class="filter-btn" onclick="filterMedia('img', event)">Foto</button>
                <button class="filter-btn" onclick="filterMedia('video', event)">Video</button>
          </div>
        </div>
      <div id="gallery-container" class="media-slider">
    </div>
  </main>
  
  <!-- Logo Infinite Scroll -->
  <div class="particles"></div>
   
  <div class="slide">
    <div class="track">
    <div class="grup">
        <img src="img/one-piece-logo.png" alt="One Piece"/>
        <img src="img/Monkey D Luffy.png" alt="logo_1"/>
        <img src="img/Zoro.png" alt="logo_2"/>
        <img src="img/Sanji.png" alt="logo_3" />
        <img src="img/Nami.png" alt="logo_4" />
        <img src="img/Robbin.png" alt="logo_5" />
        <img src="img/Chopper.png" alt="logo_6" />
       <img src="img/Franky.png" alt="logo_7" />
        <img src="img/Usoop.png" alt="logo_8" />
        <img src="img/Brook.png" alt="logo_9" />
        <img src="img/Jinbe.png" alt="logo_10" />
      </div>
    </div>
  </div>

    <!-- COPYRIGHT -->
    <footer>
      <div class="footer-content">
      <small>
        <p>&#169; <span id="year"></span> <strong>ワンギャラリー</strong>. All Rights Reserved. Dibuat dengan ❤️ oleh <strong>Bryant Tuakora.</strong></p>
        </small>
        </div>
    </footer>

    <!-- Open/ Close lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <div class="lightbox-content" id="lightbox-content" onclick="event.stopPropagation()"></div>
      </div>
    <script src="script.js"></script>
  </body>
</html>
